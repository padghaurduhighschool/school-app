/* English default */
.lang-en {
    font-family: system-ui, sans-serif;
}

/* Marathi */
.lang-mr {
    font-family: 'Kokila', 'Noto Sans Devanagari', sans-serif;
}

/* Urdu */
.lang-ur {
    font-family: 'Noto Nastaliq Urdu', serif;
    direction: rtl;
    text-align: right;
}
        body {
        background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
        min-height: 100vh;
        font-family: 'Inter', sans-serif;
    }

    /* The Glass Effect */
    .glass-card {
        background: rgba(255, 255, 255, 0.4);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }

    /* Bottom Nav Glass Effect */
    .glass-nav {
        background: rgba(255, 255, 255, 0.8);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(10px);
        border-top: 1px solid rgba(255, 255, 255, 0.5);
    }
        /* Modern Nav Styling */
.nav-btn {
    color: #94a3b8; /* slate-400 */
}

.nav-btn.active {
    color: #2563eb; /* blue-600 */
    transform: translateY(-5px);
}

.nav-btn i {
    transition: transform 0.2s ease;
}

.nav-btn:active i {
    transform: scale(0.8);
}

    </style>

<body class="bg-gray-100 font-sans">

    <div id="splash-screen" class="fixed inset-0 bg-white flex flex-col items-center justify-center z-50">
        <img src="Padgha Urdu High School Logo.png" alt="School Logo" class="w-32 h-32 object-contain mb-4">
        <h1 class="text-2xl font-bold text-gray-800">Padgha Urdu High School</h1>
        <div class="mt-4 animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
    </div>

    <div id="login-screen" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
            <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>
            <input type="tel" id="phone" placeholder="Phone Number" class="w-full p-4 mb-4 border rounded-xl">
            <input type="text" id="code" placeholder="8-digit Code" class="w-full p-4 mb-6 border rounded-xl">
            <button onclick="handleLogin()" class="w-full bg-blue-600 text-white p-4 rounded-xl font-bold text-lg">Login</button>
            <button class="w-full mt-4 text-blue-600 font-medium">Help (Contact School)</button>
        </div>
    </div>

    <div id="main-app" class="hidden pb-20">
        <header class="bg-blue-600 text-white p-4 sticky top-0">
            <h1 id="user-role-title" class="text-lg font-bold">Dashboard</h1>
        </header>

        <main id="content" class="p-4">
            </main>

<nav class="fixed bottom-6 left-4 right-4 bg-white/80 backdrop-blur-lg border border-white/20 shadow-[0_8px_32px_0_rgba(31,38,135,0.15)] rounded-2xl flex justify-around p-2 z-50">
    <button onclick="setActiveNav(this, 'home')" class="nav-btn active flex flex-col items-center justify-center w-16 h-14 transition-all duration-300">
        <i class="fa-solid fa-house-chimney text-lg"></i>
        <span class="text-[9px] mt-1 font-bold uppercase tracking-widest">Home</span>
    </button>

    <button onclick="setActiveNav(this, 'attendance')" class="nav-btn flex flex-col items-center justify-center w-16 h-14 transition-all duration-300">
        <i class="fa-solid fa-calendar-check text-lg"></i>
        <span class="text-[9px] mt-1 font-bold uppercase tracking-widest">Roll Call</span>
    </button>

    <button onclick="setActiveNav(this, 'homework')" class="nav-btn flex flex-col items-center justify-center w-16 h-14 transition-all duration-300">
        <i class="fa-solid fa-book-bookmark text-lg"></i>
        <span class="text-[9px] mt-1 font-bold uppercase tracking-widest">Work</span>
    </button>

    <button onclick="setActiveNav(this, 'notices')" class="nav-btn flex flex-col items-center justify-center w-16 h-14 transition-all duration-300 relative">
        <i class="fa-solid fa-bullhorn text-lg"></i>
        <span class="text-[9px] mt-1 font-bold uppercase tracking-widest">News</span>
        <span class="absolute top-3 right-5 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
    </button>

    <button onclick="setActiveNav(this, 'more')" class="nav-btn flex flex-col items-center justify-center w-16 h-14 transition-all duration-300">
        <i class="fa-solid fa-grip text-lg"></i>
        <span class="text-[9px] mt-1 font-bold uppercase tracking-widest">Menu</span>
    </button>
</nav>
