<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Padgha Urdu High School</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#6366f1">
    <link rel="apple-touch-icon" href="Padgha Urdu High School Logo.png">
    <link rel="icon" type="image/png" href="Padgha Urdu High School Logo.png">
    <link rel="stylesheet" href="style.css">
    <!-- Fonts & Icons -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu&family=Noto+Sans+Devanagari&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Modern Splash Screen -->
    <div id="splash-screen" class="fixed inset-0 bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex flex-col items-center justify-center z-50">
        <div class="text-center animate-bounce">
            <img src="Padgha Urdu High School Logo.png" alt="School Logo" class="w-28 h-28 object-contain mx-auto mb-6 splash-logo">
            <h1 class="text-3xl font-bold text-white mb-2">Padgha Urdu High School</h1>
            <p class="text-white/80 text-sm">Empowering Education, Enabling Excellence</p>
        </div>
        <div class="mt-8">
            <div class="loading-spinner"></div>
        </div>
    </div>

    <!-- Modern Login Screen -->
    <div id="login-screen" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="glass-card w-full max-w-md p-8">
            <div class="text-center mb-8">
                <img src="Padgha Urdu High School Logo.png" alt="Logo" class="w-20 h-20 mx-auto mb-4">
                <h2 class="text-2xl font-bold gradient-text">Welcome Back!</h2>
                <p class="text-gray-500 text-sm mt-2">Login to access your dashboard</p>
            </div>
            
            <div class="space-y-4">
                <div class="relative">
                    <i class="fas fa-phone-alt absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="tel" id="phone" placeholder="Phone Number" 
                        class="modern-input w-full pl-12">
                </div>
                
                <div class="relative">
                    <i class="fas fa-key absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
                    <input type="text" id="code" placeholder="8-digit Code" 
                        class="modern-input w-full pl-12">
                </div>
                
                <button onclick="handleLogin()" class="modern-btn w-full">
                    <i class="fas fa-arrow-right-to-bracket mr-2"></i>Login
                </button>
                
                <button class="w-full text-indigo-600 text-sm font-medium mt-4 hover:text-indigo-700 transition">
                    <i class="fas fa-headset mr-1"></i>Contact School Support
                </button>
            </div>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="main-app" class="hidden pb-20">
        <!-- Modern Header -->
        <header class="bg-gradient-to-r from-indigo-600 to-purple-600 text-white p-5 sticky top-0 z-30 shadow-lg">
            <div class="flex items-center justify-between">
                <div class="flex items-center space-x-3">
                    <img src="Padgha Urdu High School Logo.png" alt="Logo" class="w-10 h-10 rounded-full bg-white/20 p-1">
                    <div>
                        <h1 id="user-role-title" class="text-lg font-bold">Dashboard</h1>
                        <p class="text-xs text-white/80" id="user-name-display"></p>
                    </div>
                </div>
                <div class="flex space-x-3">
                    <button onclick="showNotifications()" class="relative">
                        <i class="fas fa-bell text-xl"></i>
                        <span class="notification-badge hidden" id="notification-count">3</span>
                    </button>
                    <button onclick="toggleTheme()">
                        <i class="fas fa-moon text-xl"></i>
                    </button>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main id="content" class="p-4 pb-24">
            <!-- Dynamic content loads here -->
        </main>

        <!-- Modern Bottom Navigation -->
        <nav class="fixed bottom-0 left-0 right-0 glass-nav flex justify-around p-3 pb-5 z-50">
            <button onclick="setActiveNav(this, 'home')" class="nav-btn flex flex-col items-center">
                <i class="fas fa-home text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">Home</span>
            </button>
            <button onclick="setActiveNav(this, 'attendance')" class="nav-btn flex flex-col items-center">
                <i class="fas fa-calendar-check text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">Attendance</span>
            </button>
            <button onclick="setActiveNav(this, 'homework')" class="nav-btn flex flex-col items-center">
                <i class="fas fa-book-open text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">Homework</span>
            </button>
            <button onclick="setActiveNav(this, 'notices')" class="nav-btn flex flex-col items-center">
                <i class="fas fa-bell text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">Notices</span>
            </button>
            <button onclick="setActiveNav(this, 'more')" class="nav-btn flex flex-col items-center">
                <i class="fas fa-user-circle text-xl"></i>
                <span class="text-[10px] mt-1 font-medium">Profile</span>
            </button>
        </nav>
        
        <!-- Floating Action Button -->
        <div class="fab" onclick="scrollToTop()">
            <i class="fas fa-arrow-up text-xl"></i>
        </div>
    </div>

    <!-- Load Firebase FIRST (only once) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <!-- Then initialize Firebase -->
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAatxuUMNJ2lK-jdWLNaugF-tNXElOcrUs",
            authDomain: "padgha-school-erp.firebaseapp.com",
            databaseURL: "https://padgha-school-erp-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "padgha-school-erp",
            storageBucket: "padgha-school-erp.firebasestorage.app",
            messagingSenderId: "481255456109",
            appId: "1:481255456109:web:077e656f3dd03aee43ae64",
            measurementId: "G-RXBBRWG5SE"
        };
        
        firebase.initializeApp(firebaseConfig);
        console.log("Firebase initialized");
    </script>

    <!-- Then load app.js (without Firebase initialization inside) -->
    <script src="app.js"></script>

    <!-- Navigation functions -->
    <script>
        function setActiveNav(element, section) {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            if (typeof loadSection === 'function') {
                loadSection(section);
            }
        }
        
        function scrollToTop() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function showNotifications() {
            if (typeof loadSection === 'function') {
                loadSection('notices');
            }
        }
        
        function toggleTheme() {
            document.body.classList.toggle('dark');
        }
        
        function updateUserDisplay() {
            const userName = localStorage.getItem('userName');
            const userRole = localStorage.getItem('userRole');
            const displayEl = document.getElementById('user-name-display');
            if (displayEl && userName) {
                displayEl.innerText = `${userRole} • ${userName}`;
            }
        }
        
        // Service worker registration (after page load)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log("PWA Registered", reg))
                    .catch(err => console.log("PWA Failed", err));
            });
        }
window.handleLogout = window.handleLogout || function() {
    if (confirm("Are you sure you want to logout?")) {
        localStorage.clear();
        document.getElementById('main-app').classList.add('hidden');
        document.getElementById('login-screen').classList.remove('hidden');
        location.reload();
    }
};
    </script>
</body>
</html>
