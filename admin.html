        // Fetch staff attendance logs from Firebase
        async function fetchStaffLogsData() {
            const dateKey = new Date().toISOString().split('T')[0];
            const container = document.getElementById('staff-logs-container');
            
            try {
                // Get all staff from CSV to have names and roles
                const staffResponse = await fetch(TEACHER_SHEET_CSV);
                const staffText = await staffResponse.text();
                const staffRows = staffText.split('\n').slice(1);
                const staffMap = new Map(); // phone -> {name, role}
                
                for (let i = 0; i < staffRows.length; i++) {
                    if (!staffRows[i].trim()) continue;
                    const cols = staffRows[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 4) {
                        const phone = cols[0]?.replace(/"/g, '').trim();
                        const name = cols[2]?.replace(/"/g, '').trim();
                        const role = cols[3]?.replace(/"/g, '').trim();
                        if (phone && name) {
                            staffMap.set(phone, { name, role });
                        }
                    }
                }
                
                // Get attendance logs for today
                const snapshot = await firebase.database().ref(`attendance/${dateKey}`).once('value');
                const logsData = snapshot.val();
                
                if (!logsData) {
                    container.innerHTML = `<div class="text-center py-10 text-gray-400">No attendance logs found for today.</div>`;
                    return;
                }
                
                // Process logs: group by staff member (by name) to combine IN/OUT
                const staffLogsMap = new Map(); // name -> { logs: [], role, phone, firstIn, lastOut }
                Object.values(logsData).forEach(log => {
                    const name = log.name;
                    if (!name) return;
                    
                    if (!staffLogsMap.has(name)) {
                        // Find staff info from CSV
                        let staffRole = 'Staff';
                        let staffPhone = '';
                        for (let [phone, info] of staffMap.entries()) {
                            if (info.name === name) {
                                staffRole = info.role;
                                staffPhone = phone;
                                break;
                            }
                        }
                        staffLogsMap.set(name, {
                            name: name,
                            role: staffRole,
                            phone: staffPhone,
                            logs: [],
                            firstIn: null,
                            lastOut: null
                        });
                    }
                    
                    const entry = staffLogsMap.get(name);
                    entry.logs.push({
                        type: log.type,
                        time: log.time,
                        distance: log.distance,
                        timestamp: log.timestamp
                    });
                    
                    if (log.type.includes('IN')) {
                        if (!entry.firstIn || log.timestamp < entry.firstIn.timestamp) {
                            entry.firstIn = { time: log.time, timestamp: log.timestamp, distance: log.distance };
                        }
                    }
                    if (log.type.includes('OUT')) {
                        if (!entry.lastOut || log.timestamp > entry.lastOut.timestamp) {
                            entry.lastOut = { time: log.time, timestamp: log.timestamp, distance: log.distance };
                        }
                    }
                });
                
                // Convert to array and sort by name
                const staffArray = Array.from(staffLogsMap.values()).sort((a, b) => a.name.localeCompare(b.name));
                
                if (staffArray.length === 0) {
                    container.innerHTML = `<div class="text-center py-10 text-gray-400">No staff attendance records found.</div>`;
                    return;
                }
                
                // Render the logs
                container.innerHTML = staffArray.map(staff => {
                    const inStatus = staff.firstIn ? `<span class="text-green-600"><i class="fa-solid fa-sign-in-alt mr-1"></i>${staff.firstIn.time}</span>` : '<span class="text-gray-400">Not checked in</span>';
                    const outStatus = staff.lastOut ? `<span class="text-red-600"><i class="fa-solid fa-sign-out-alt mr-1"></i>${staff.lastOut.time}</span>` : '<span class="text-gray-400">Not checked out</span>';
                    
                    return `
                        <div class="bg-white rounded-2xl border shadow-sm overflow-hidden staff-log-item" data-name="${staff.name.toLowerCase()}" data-role="${staff.role.toLowerCase()}">
                            <div class="p-4">
                                <div class="flex justify-between items-start">
                                    <div class="flex-1">
                                        <div class="flex items-center gap-2 flex-wrap mb-2">
                                            <h3 class="font-bold text-gray-800 text-lg">${escapeHtml(staff.name)}</h3>

        function fetchClassAttendanceStatus() {
            const dateKey = new Date().toISOString().split('T')[0];
            const container = document.getElementById('class-status-container');

            firebase.database().ref(`student_attendance/${dateKey}`).on('value', (snapshot) => {
                const attendanceData = snapshot.val() || {};
                
                fetch(STUDENT_SHEET_CSV).then(response => response.text()).then(text => {
                    const rows = text.split('\n').filter(row => row.trim()).slice(1);
                    const classCounts = {};
                    
                    rows.forEach(row => {
                        const cols = row.split(',');
                        const studentClass = cols[1]?.replace(/"/g, '').trim();
                        if (studentClass) {
                            classCounts[studentClass] = (classCounts[studentClass] || 0) + 1;
                        }
                    });
                    
                    container.innerHTML = schoolClasses.map(className => {
                        const record = attendanceData[className];
                        const isMarked = !!record;
                        const studentCount = classCounts[className] || 0;
                        const markedCount = record?.records ? Object.keys(record.records).length : 0;
                        const presentCount = record?.records ? Object.values(record.records).filter(r => r.status === 'Present').length : 0;
                        const absentCount = markedCount - presentCount;
                        const pendingCount = studentCount - markedCount;
                        
                        let statusColor = 'bg-gray-100 text-gray-600';
                        let statusText = 'Not Started';
                        
                        if (isMarked) {
                            if (markedCount === studentCount && studentCount > 0) {
                                statusColor = 'bg-green-100 text-green-600';
                                statusText = '✅ Complete';
                            } else if (markedCount > 0) {
                                statusColor = 'bg-yellow-100 text-yellow-600';
                                statusText = '⚠️ Partial';
                            } else {
                                statusColor = 'bg-orange-100 text-orange-600';
                                statusText = '📝 Marked (No Students)';
                            }
                        } else {
                            statusColor = 'bg-gray-100 text-gray-600';
                            statusText = '⏳ Pending';
                        }
                        
                        const percentage = studentCount > 0 ? Math.round((presentCount / studentCount) * 100) : 0;
                        
                        return `
                            <div class="bg-white rounded-xl border shadow-sm hover:shadow-md transition-all overflow-hidden">
                                <div class="p-4">
                                    <div class="flex justify-between items-start mb-3">
                                        <div class="flex items-center gap-3">
                                            <div class="w-12 h-12 rounded-xl ${isMarked ? 'bg-green-100 text-green-600' : 'bg-orange-100 text-orange-600'} flex flex-col items-center justify-center">
                                                <span class="text-[10px] font-bold">Class</span>
                                                <span class="text-lg font-black">${className}</span>
                                            </div>
                                            <div>
                                                <p class="font-bold text-gray-800">${className}</p>
                                                <p class="text-[10px] text-gray-400">Total: ${studentCount} students</p>
                                            </div>
                                        </div>
                                        <span class="px-2 py-1 rounded-full text-[10px] font-bold ${statusColor}">${statusText}</span>
                                    </div>
                                    
                                    ${isMarked ? `
                                        <div class="grid grid-cols-3 gap-2 mb-3 text-center">
                                            <div class="bg-green-50 rounded-lg p-2">
                                                <p class="text-lg font-bold text-green-600">${presentCount}</p>
                                                <p class="text-[9px] text-gray-500">Present</p>
                                            </div>
                                            <div class="bg-red-50 rounded-lg p-2">
                                                <p class="text-lg font-bold text-red-600">${absentCount}</p>
                                                <p class="text-[9px] text-gray-500">Absent</p>
                                            </div>
                                            <div class="bg-gray-50 rounded-lg p-2">
                                                <p class="text-lg font-bold text-gray-600">${pendingCount}</p>
                                                <p class="text-[9px] text-gray-500">Pending</p>
                                            </div>
                                        </div>
                                        <div class="w-full bg-gray-200 rounded-full h-2 mb-3">
                                            <div class="bg-green-500 h-2 rounded-full" style="width: ${percentage}%"></div>
                                        </div>
                                        <div class="text-[10px] text-gray-400 text-center">
                                            <i class="fa-regular fa-user-check mr-1"></i>Marked by: ${record.markedBy || 'Admin'}
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                }).catch(err => {
                    console.error("Error loading class counts:", err);
                    container.innerHTML = `<p class="text-center py-10 text-red-500">Error loading class data</p>`;
                });
            });
        }

        window.downloadAttendanceReport = async () => {

                const snapshot = await firebase.database().ref(`student_attendance/${dateKey}`).once('value');

                let csvContent = "Class,Student Name,GR Number,Status,Marked By\n";

                        for (let [grNo, record] of Object.entries(data[className].records)) {

                const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement('a');
                const url = URL.createObjectURL(blob);
                link.href = url;
                link.setAttribute('download', `attendance_${dateKey}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
                showToast("Attendance report downloaded");
            } catch (error) {
                alert("Error downloading report: " + error.message);
            }
        };

                const snapshot = await firebase.database().ref('student_attendance').once('value');
                const allData = snapshot.val();
                let csvContent = "Date,Class,Student Name,GR Number,Status\n";
                
                for (let date in allData) {

                            if (allData[date][className].records) {

                const paymentsLines = paymentsText.split('\n');
                
                const paymentHeaders = paymentsLines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
                
                feesDataCache.payments = [];
                for (let i = 1; i < paymentsLines.length; i++) {
                    if (!paymentsLines[i].trim()) continue;
                    const cols = paymentsLines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    const studentNameIndex = paymentHeaders.findIndex(h => h.includes('name') || h.includes('student'));
                    const receiptIndex = paymentHeaders.findIndex(h => h.includes('receipt') || h.includes('voucher'));
                    const dateIndex = paymentHeaders.findIndex(h => h.includes('date'));
                    const amountIndex = paymentHeaders.findIndex(h => h.includes('amount') || h.includes('paid'));
                    
                    let studentName = studentNameIndex >= 0 ? cols[studentNameIndex]?.replace(/"/g, '').trim() : '';
                    let receiptNo = receiptIndex >= 0 ? cols[receiptIndex]?.replace(/"/g, '').trim() : `RCPT-${i}`;
                    let date = dateIndex >= 0 ? cols[dateIndex]?.replace(/"/g, '').trim() : '';
                    let amount = amountIndex >= 0 ? parseFloat(cols[amountIndex]?.replace(/"/g, '').trim()) || 0 : 0;
                    
                    if (!studentName && cols[1]) studentName = cols[1]?.replace(/"/g, '').trim();
                    if (!receiptNo && cols[0]) receiptNo = cols[0]?.replace(/"/g, '').trim();
                    if (!date && cols[2]) date = cols[2]?.replace(/"/g, '').trim();
                    if (!amount && cols[3]) amount = parseFloat(cols[3]?.replace(/"/g, '').trim()) || 0;
                    
                    if (studentName) {
                        feesDataCache.payments.push({
                            name: studentName,
                            receiptNo: receiptNo,
                            date: date,
                            amount: amount
                        });
                    }
                }
                
                const chartRes = await fetch(FEES_CHART_URL);
                const chartText = await chartRes.text();
                const chartLines = chartText.split('\n');
                
                const chartHeaders = chartLines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
                const classIndex = chartHeaders.findIndex(h => h.includes('class') || h.includes('standard'));
                const totalFeesIndex = chartHeaders.findIndex(h => h.includes('total') || h.includes('fees') || h.includes('amount'));
                
                for (let i = 1; i < chartLines.length; i++) {
                    if (!chartLines[i].trim()) continue;
                    const cols = chartLines[i].split(',');
                    let className = classIndex >= 0 ? cols[classIndex]?.replace(/"/g, '').trim() : '';
                    let totalFees = totalFeesIndex >= 0 ? parseFloat(cols[totalFeesIndex]?.replace(/"/g, '').trim()) || 0 : 0;
                    
                    if (!className && cols[0]) className = cols[0]?.replace(/"/g, '').trim();
                    if (!totalFees && cols[1]) totalFees = parseFloat(cols[1]?.replace(/"/g, '').trim()) || 0;
                    
                    if (className) {
                        feesDataCache.feeStructure[className] = totalFees;
                    }
                }
                
                const studentRes = await fetch(STUDENT_SHEET_CSV);
                const studentText = await studentRes.text();
                const studentRows = studentText.split('\n').slice(1);
                
                feesDataCache.students = [];
                for (const row of studentRows) {
                    if (!row.trim()) continue;
                    const cols = row.split(',');
                    const name = cols[7]?.replace(/"/g, '').trim();
                    const className = cols[1]?.replace(/"/g, '').trim();
                    const grNo = cols[2]?.replace(/"/g, '').trim();
                    const phone = cols[15]?.replace(/"/g, '').trim();
                    
                    if (name) {
                        feesDataCache.students.push({
                            name: name,
                            class: className,
                            grNo: grNo,
                            phone: phone
                        });
                    }
                }
                
                console.log("Fees data loaded:", {
                    payments: feesDataCache.payments.length,
                    feeStructure: Object.keys(feesDataCache.feeStructure).length
                });
                
            } catch (error) {
                console.error("Error loading fees data:", error);
            }
        }

        window.refreshFeesData = async () => {
            await loadFeesData();
            renderAdminFeesDashboard();
            showToast("Fees data refreshed");
        };

        function renderAdminFeesDashboard() {
            const container = document.getElementById('feesDashboardContent');
            if (!container) return;
            
            container.innerHTML = `
                <div class="space-y-4">
                    <div class="bg-white rounded-xl shadow-sm border p-4">
                        <h3 class="font-bold text-gray-800 mb-3"><i class="fa-solid fa-search mr-2 text-blue-600"></i>Search Student</h3>
                        <div class="space-y-3">
                            <input type="text" id="adminStudentSearch" 
                                onkeyup="filterStudentsForFees()"
                                placeholder="Search by name, GR number..." 
                                class="w-full p-3 bg-gray-50 rounded-xl text-sm border">
                            <div id="studentSearchResults" class="max-h-60 overflow-y-auto space-y-2">
                                <!-- Results -->
                            </div>
                        </div>
                    </div>
                    
                    <div id="selectedStudentCard" class="hidden bg-gradient-to-r from-blue-600 to-blue-700 rounded-xl p-4 text-white">
                        <div class="flex justify-between items-start">
                            <div>
                                <h3 id="selectedStudentName" class="font-bold text-lg"></h3>
                                <p id="selectedStudentClass" class="text-sm opacity-80"></p>
                                <p id="selectedStudentGr" class="text-xs opacity-70 mt-1"></p>
                            </div>
                            <div class="text-right">
                                <p id="selectedStudentPhone" class="text-sm"></p>
                                <a id="callStudentBtn" href="#" class="text-xs text-white/80 hover:text-white inline-block mt-1">
                                    <i class="fa-solid fa-phone"></i> Call
                                </a>
                            </div>
                        </div>
                    </div>
                    
                    <div id="paymentHistoryCard" class="hidden bg-white rounded-xl shadow-sm border overflow-hidden">
                        <div class="bg-gray-50 px-4 py-3 border-b">
                            <h3 class="font-bold text-gray-800"><i class="fa-solid fa-receipt mr-2 text-green-600"></i>Payment History</h3>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full">
                                <thead class="bg-gray-100">
                                    <tr><th class="p-3 text-left text-xs font-bold text-gray-600">Receipt No.</th>
                                    <th class="p-3 text-left text-xs font-bold text-gray-600">Date</th>
                                    <th class="p-3 text-right text-xs font-bold text-gray-600">Amount (₹)</th>
                                </tr>
                                </thead>
                                <tbody id="paymentHistoryBody">
                                    <tr><td colspan="3" class="p-8 text-center text-gray-400">Select a student to view payment history</td></tr>
                                </tbody>
                                <tfoot class="bg-gray-50 border-t">
                                    <tr><td colspan="2" class="p-3 text-right font-bold">Total Paid:</td><td class="p-3 text-right font-bold text-green-600" id="totalPaidAmount">₹0</td></tr>
                                    <tr><td colspan="2" class="p-3 text-right font-bold">Balance:</td><td class="p-3 text-right font-bold text-red-600" id="balanceAmount">₹0</td></tr>
                                </tfoot>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            
            displayStudentSearchResults('');
        }

        function displayStudentSearchResults(searchTerm) {
            const resultsContainer = document.getElementById('studentSearchResults');
            if (!resultsContainer) return;
            
            const term = searchTerm.toLowerCase();
            const filtered = feesDataCache.students.filter(s => 
                s.name.toLowerCase().includes(term) || 
                s.grNo?.toLowerCase().includes(term)
            ).slice(0, 20);
            
            if (filtered.length === 0) {
                resultsContainer.innerHTML = '<div class="text-center py-4 text-gray-400 text-sm">No students found</div>';
                return;
            }
            
            resultsContainer.innerHTML = filtered.map(s => `
                <div onclick="selectStudentForFees('${s.name.replace(/'/g, "\\'")}')" 
                    class="p-3 bg-gray-50 rounded-lg cursor-pointer hover:bg-blue-50 transition-all">
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-bold text-gray-800 text-sm">${escapeHtml(s.name)}</p>
                            <p class="text-xs text-gray-500">${s.class || 'N/A'} ${s.grNo ? `| GR: ${s.grNo}` : ''}</p>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-300"></i>
                    </div>
                </div>
            `).join('');
        }

        window.filterStudentsForFees = () => {
            const searchTerm = document.getElementById('adminStudentSearch')?.value || '';
            displayStudentSearchResults(searchTerm);
        };

        window.selectStudentForFees = (studentName) => {
            const student = feesDataCache.students.find(s => s.name === studentName);
            if (!student) return;
            
            const payments = feesDataCache.payments.filter(p => 
                p.name.toLowerCase() === studentName.toLowerCase()
            );
            payments.sort((a, b) => b.date.localeCompare(a.date));
            
            const totalPaid = payments.reduce((sum, p) => sum + p.amount, 0);
            const totalFees = feesDataCache.feeStructure[student.class] || 0;
            const balance = totalFees - totalPaid;
            
            document.getElementById('selectedStudentCard').classList.remove('hidden');
            document.getElementById('selectedStudentName').innerText = student.name;
            document.getElementById('selectedStudentClass').innerHTML = student.class ? `Class ${student.class}` : 'Class not assigned';
            document.getElementById('selectedStudentGr').innerHTML = student.grNo ? `GR: ${student.grNo}` : 'GR: Pending';
            document.getElementById('selectedStudentPhone').innerHTML = student.phone ? `<i class="fa-solid fa-phone mr-1"></i>${student.phone}` : 'Phone not available';
            
            const callBtn = document.getElementById('callStudentBtn');
            if (student.phone) {
                callBtn.href = `tel:${student.phone}`;
                callBtn.style.display = 'inline-block';
            } else {
                callBtn.style.display = 'none';
            }
            
            const tbody = document.getElementById('paymentHistoryBody');
            if (payments.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-gray-400">No payment records found</td></tr>';
            } else {
                tbody.innerHTML = payments.map(p => `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="p-3 text-sm">${escapeHtml(p.receiptNo)}</td>
                        <td class="p-3 text-sm">${p.date || 'N/A'}</td>
                        <td class="p-3 text-right text-sm font-medium text-green-600">₹${p.amount.toLocaleString()}</td>
                    </tr>
                `).join('');
            }
            
            document.getElementById('paymentHistoryCard').classList.remove('hidden');
            document.getElementById('totalPaidAmount').innerHTML = `₹${totalPaid.toLocaleString()}`;
            document.getElementById('balanceAmount').innerHTML = balance > 0 ? `₹${balance.toLocaleString()}` : 'PAID';
            if (balance <= 0) {
                document.getElementById('balanceAmount').className = "p-3 text-right font-bold text-green-600";
            } else {
                document.getElementById('balanceAmount').className = "p-3 text-right font-bold text-red-600";
            }
        };

        window.showFeesChart = () => {
            const content = document.getElementById('content');
            
            content.innerHTML = `
                <div class="space-y-4 pb-20">
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2">
                            <button onclick="loadSection('home')" class="p-2 bg-gray-100 rounded-full">
                                <i class="fa-solid fa-arrow-left"></i>
                            </button>
                            <h2 class="text-lg font-bold">Fee Structure by Class</h2>
                        </div>
                        <button onclick="refreshFeesData()" class="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs">
                            <i class="fa-solid fa-refresh mr-1"></i>Refresh
                        </button>
                    </div>
                    
                    <div class="p-4 space-y-3">
                        ${Object.entries(feesDataCache.feeStructure).map(([className, totalFees]) => `
                            <div class="bg-white rounded-xl shadow-sm border p-4 flex justify-between items-center">
                                <div>
                                    <p class="font-bold text-gray-800">Class ${className}</p>
                                    <p class="text-xs text-gray-500">Annual Fees</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xl font-bold text-blue-600">₹${totalFees.toLocaleString()}</p>
                                    <p class="text-[10px] text-gray-400">per student</p>
                                </div>
                            </div>
                        `).join('')}
                        
                        ${Object.keys(feesDataCache.feeStructure).length === 0 ? `
                            <div class="text-center py-10 text-gray-400">
                                <i class="fa-solid fa-chart-line text-4xl mb-3"></i>
                                <p>No fee structure data available</p>
                                <button onclick="refreshFeesData()" class="mt-3 text-blue-600 text-xs underline">Refresh</button>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        };

        // HOME SUMMARY UPDATE
        async function updateHomeSummary() {
            const dateKey = new Date().toISOString().split('T')[0];
            
            const [staffRes, studRes] = await Promise.all([
                fetch(TEACHER_SHEET_CSV),
                fetch(STUDENT_SHEET_CSV)
            ]);
            
            const totalStaffCount = (await staffRes.text()).split('\n').filter(r => r.trim()).length - 1;
            const totalStudentCount = (await studRes.text()).split('\n').filter(r => r.trim()).length - 1;
            
            document.getElementById('home-staff-total') && (document.getElementById('home-staff-total').innerText = totalStaffCount);
            document.getElementById('home-stud-total') && (document.getElementById('home-stud-total').innerText = totalStudentCount);
            
            firebase.database().ref('attendance/' + dateKey).on('value', (snapshot) => {
                const data = snapshot.val();
                let pStaff = 0;
                if (data) {
                    const names = new Set();
                    Object.values(data).forEach(log => { if(log.type && log.type.includes('IN')) names.add(log.name); });
                    pStaff = names.size;
                }
                document.getElementById('home-staff-present') && (document.getElementById('home-staff-present').innerText = pStaff);
                document.getElementById('home-staff-absent') && (document.getElementById('home-staff-absent').innerText = Math.max(0, totalStaffCount - pStaff));
                document.getElementById('home-staff-bar') && (document.getElementById('home-staff-bar').style.width = (pStaff / totalStaffCount * 100) + "%");
            });
            
            firebase.database().ref('student_attendance/' + dateKey).on('value', (snapshot) => {
                const classesData = snapshot.val();
                let sPresent = 0, sAbsent = 0, totalMarked = 0;
                if (classesData) {
                    Object.values(classesData).forEach(classObj => {
                        if (classObj.records) {
                            Object.values(classObj.records).forEach(record => {
                                totalMarked++;
                                if (record.status === 'Present') sPresent++;
                                if (record.status === 'Absent') sAbsent++;
                            });
                        }
                    });
                }
                const sUnchecked = Math.max(0, totalStudentCount - totalMarked);
                document.getElementById('home-stud-present') && (document.getElementById('home-stud-present').innerText = sPresent);
                document.getElementById('home-stud-absent') && (document.getElementById('home-stud-absent').innerText = sAbsent);
                document.getElementById('home-stud-unchecked') && (document.getElementById('home-stud-unchecked').innerText = sUnchecked);
                document.getElementById('home-stud-bar-present') && (document.getElementById('home-stud-bar-present').style.width = (sPresent / totalStudentCount * 100) + "%");
                document.getElementById('home-stud-bar-absent') && (document.getElementById('home-stud-bar-absent').style.width = (sAbsent / totalStudentCount * 100) + "%");
            });
        }

        // UTILITY FUNCTIONS
        window.triggerInstall = async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                deferredPrompt = null;
                document.getElementById('install-button-container')?.classList.add('hidden');
            }
        };

        window.setActiveNav = (element, section) => {
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            loadSection(section);
        };

        window.scrollToTop = () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.showNotifications = () => {
            loadSection('notices');
        };

        window.toggleTheme = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('darkMode', document.body.classList.contains('dark'));
        };

        window.handleLogout = () => {
            if (confirm("Are you sure you want to logout?")) {
                localStorage.clear();
                document.getElementById('main-app').classList.add('hidden');
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('content').innerHTML = '';
                location.reload();
            }
        };

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                showToast("Copied to clipboard!");
            }).catch(() => {
                alert("Copy failed");
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-24 left-4 right-4 bg-gray-800 text-white px-4 py-2 rounded-lg text-sm shadow-lg z-50 text-center';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Apply saved theme
        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
        }

        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log("Service Worker registered", reg))
                    .catch(err => console.log("Service Worker failed", err));
            });
        }
    </script>
</body>
