    <style>
        /* === MODERN STYLES (exactly from style.css + original extras) === */
        * { font-family: 'Inter', sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }

        .splash-logo { animation: pulse 2s ease-in-out infinite; }

        .fab { position: fixed; bottom: 80px; right: 20px; width: 56px; height: 56px; border-radius: 28px; background: linear-gradient(135deg, #6366f1, #8b5cf6); color: white; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); cursor: pointer; transition: all 0.3s ease; z-index: 40; }

        body.dark .text-gray-800 { color: #f3f4f6; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    // ======================= HELPER FUNCTIONS =======================
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function formatDate(dateStr) { let parts = dateStr.split('-'); if(parts.length===3) return `${parts[2]}/${parts[1]}/${parts[0]}`; return dateStr; }
    function scrollToTop() { window.scrollTo({ top: 0, behavior: 'smooth' }); }
    function toggleTheme() { document.body.classList.toggle('dark'); localStorage.setItem('darkMode', document.body.classList.contains('dark')); }
    if (localStorage.getItem('darkMode') === 'true') document.body.classList.add('dark');

    // ======================= PUSH NOTIFICATIONS =======================
    async function initPushNotifications() { if (!('Notification' in window && 'serviceWorker' in navigator && 'PushManager' in window)) return false; const sub = await getPushSubscription(); isPushNotificationEnabled = !!sub; return true; }
    async function getPushSubscription() { if (!('serviceWorker' in navigator)) return null; const sw = await navigator.serviceWorker.ready; return sw.pushManager.getSubscription(); }
    function urlBase64ToUint8Array(base64String) { const padding = '='.repeat((4 - base64String.length % 4) % 4); const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/'); const raw = window.atob(base64); const arr = new Uint8Array(raw.length); for(let i=0;i<raw.length;i++) arr[i]=raw.charCodeAt(i); return arr; }
    async function enablePushNotifications() { if(Notification.permission !== 'granted') { let perm = await Notification.requestPermission(); if(perm !== 'granted') { alert("Please allow notifications"); return false; } } try { const swReg = await navigator.serviceWorker.ready; const sub = await swReg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY) }); const userId = localStorage.getItem('userGR') || localStorage.getItem('userPhone'); await firebase.database().ref('push_subscriptions/' + userId).set({ endpoint: sub.endpoint, keys: sub.toJSON().keys, userId, userRole: 'Student', userName: localStorage.getItem('userName'), subscribedAt: firebase.database.ServerValue.TIMESTAMP }); isPushNotificationEnabled = true; updateNotificationButtonUI(true); alert("✅ Notifications enabled"); return true; } catch(e) { alert("Error: "+e.message); return false; } }
    async function disablePushNotifications() { const sub = await getPushSubscription(); if(sub) await sub.unsubscribe(); const userId = localStorage.getItem('userGR') || localStorage.getItem('userPhone'); await firebase.database().ref('push_subscriptions/' + userId).remove(); isPushNotificationEnabled = false; updateNotificationButtonUI(false); alert("Notifications disabled"); }
    function updateNotificationButtonUI(enabled) { const btn = document.getElementById('enable-notifications-btn'); if(btn){ let icon = btn.querySelector('i'); if(icon) icon.className = enabled ? "fas fa-bell mr-2 text-blue-600" : "fas fa-bell-slash mr-2 text-blue-600"; let span = btn.querySelector('span'); if(span) span.textContent = enabled ? "✅ Notifications Enabled" : "🔔 Enable Notifications"; } }
    async function checkNotificationStatus() { await initPushNotifications(); updateNotificationButtonUI(isPushNotificationEnabled); }
    window.togglePushNotifications = async () => { if(isPushNotificationEnabled) { if(confirm('Disable notifications?')) await disablePushNotifications(); } else await enablePushNotifications(); };

    // ======================= FEES DATA LOADING =======================
async function loadFeesData() {
    const FEES_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRvXFLMLsq-rdnjq7DGez4eDUlYupTGX9bDMOWnDF1zQifrq9r2nNISZJRT6-AaS_Pwg8RqZFbsfbMy/pub?gid=0&single=true&output=csv";
    
    try {
        // 1. Load Payments – using exact robust logic from teacher portal
        const paymentsRes = await fetch(FEES_CSV_URL);
        const paymentsText = await paymentsRes.text();
        const paymentsLines = paymentsText.split('\n');
        const paymentHeaders = paymentsLines[0].split(',').map(h => h.replace(/"/g, '').trim().toLowerCase());
        feesDataCache.payments = [];
        
        console.log("📊 Payment CSV Headers:", paymentHeaders);
        
        for (let i = 1; i < paymentsLines.length; i++) {
            if (!paymentsLines[i].trim()) continue;
            // Use regex to split while respecting quoted commas
            const cols = paymentsLines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            const studentNameIndex = paymentHeaders.findIndex(h => h.includes('name') || h.includes('student'));
            const receiptIndex = paymentHeaders.findIndex(h => h.includes('receipt') || h.includes('voucher'));
            const dateIndex = paymentHeaders.findIndex(h => h.includes('date'));
            const amountIndex = paymentHeaders.findIndex(h => h.includes('amount') || h.includes('paid'));
            
            let studentName = studentNameIndex >= 0 ? cols[studentNameIndex]?.replace(/"/g, '').trim() : '';
            let receiptNo = receiptIndex >= 0 ? cols[receiptIndex]?.replace(/"/g, '').trim() : `RCPT-${i}`;
            let date = dateIndex >= 0 ? cols[dateIndex]?.replace(/"/g, '').trim() : '';
            let amount = amountIndex >= 0 ? parseFloat(cols[amountIndex]?.replace(/"/g, '').trim()) || 0 : 0;
            
            // Fallback for common column positions if headers not found
            if (!studentName && cols[1]) studentName = cols[1]?.replace(/"/g, '').trim();
            if (!receiptNo && cols[0]) receiptNo = cols[0]?.replace(/"/g, '').trim();
            if (!date && cols[2]) date = cols[2]?.replace(/"/g, '').trim();
            if (!amount && cols[3]) amount = parseFloat(cols[3]?.replace(/"/g, '').trim()) || 0;
            
            if (studentName) {
                feesDataCache.payments.push({ name: studentName, receiptNo, date, amount });
                console.log(`✅ Loaded payment: ${studentName} - ₹${amount} (${receiptNo})`);
            } else {
                console.warn(`⚠️ Skipping row ${i}: no student name found`, cols);
            }
        }
        
        console.log(`📊 Total payments loaded: ${feesDataCache.payments.length}`);
        
        // 2. Load Fee Structure from Firebase (unchanged)
        feesDataCache.feeStructure = {};
        try {
            const snap = await firebase.database().ref('feeStructure/classWise').once('value');
            if (snap.exists()) {
                feesDataCache.feeStructure = snap.val();
                console.log("✅ Student fee structure from Firebase:", feesDataCache.feeStructure);
            } else {
                console.warn("⚠️ No fee structure in Firebase. Please ask admin to set it.");
            }
        } catch (err) {
            console.warn("Could not load fee structure from Firebase", err);
        }
        
        // 3. Load Students (unchanged, but ensure name trimming)
        const studentRes = await fetch(STUDENT_SHEET_CSV);
        const studentText = await studentRes.text();
        const rows = studentText.split('\n').slice(1);
        feesDataCache.students = [];
        for (let row of rows) {
            if (!row.trim()) continue;
            const cols = row.split(',');
            const sname = cols[7]?.replace(/"/g, '').trim();
            const sclass = cols[1]?.replace(/"/g, '').trim();
            const gr = cols[2]?.replace(/"/g, '').trim();
            const phone = cols[15]?.replace(/"/g, '').trim();
            if (sname) feesDataCache.students.push({ name: sname, class: sclass, grNo: gr, phone });
        }
        
        console.log("Student fees data loaded:", { 
            payments: feesDataCache.payments.length, 
            samplePayment: feesDataCache.payments[0],
            studentName: localStorage.getItem('userName')
        });
    } catch (e) {
        console.error("Error loading fees data:", e);
    }
}

    // ======================= STUDENT ATTENDANCE LOGS =======================
    async function fetchPersonalStudentLogs(studentName) {
        const container = document.getElementById('personal-logs');
        if(!container) return;
        container.innerHTML = '<div class="text-center py-8"><i class="fa-solid fa-spinner fa-spin"></i><p class="text-gray-400 text-sm">Loading...</p></div>';
        try {
            const studentGR = localStorage.getItem('userGR');
            const snapshot = await firebase.database().ref('student_attendance').once('value');
            const allData = snapshot.val();
            let present=0, absent=0, records=[];
            if(allData) {
                Object.keys(allData).forEach(dateStr => {
                    Object.keys(allData[dateStr]).forEach(className => {
                        const classData = allData[dateStr][className];
                        if(classData?.records) {
                            let found = null;
                            if(studentGR && studentGR!=='Pending' && classData.records[studentGR]) found = classData.records[studentGR];
                            else if(classData.records[studentName]) found = classData.records[studentName];
                            else for(let key in classData.records) if(classData.records[key].name?.toLowerCase() === studentName.toLowerCase()) { found = classData.records[key]; break; }
                            if(found) { records.push({ date: dateStr, status: found.status }); if(found.status==='Present') present++; else if(found.status==='Absent') absent++; }
                        }
                    });
                });
            }
            records.sort((a,b)=>b.date.localeCompare(a.date));
            const total = records.length;
            const percent = total ? Math.round((present/total)*100) : 0;
            const now = new Date(); const curMonth = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
            const monthRecords = records.filter(r=>r.date.startsWith(curMonth));
            const monthPresent = monthRecords.filter(r=>r.status==='Present').length;
            if(records.length===0) { container.innerHTML = `<div class="text-center p-6 bg-gray-50 rounded-xl"><i class="fa-regular fa-calendar-xmark text-5xl text-gray-300"></i><p class="mt-2">No attendance records yet</p></div>`; return; }
            container.innerHTML = `
                <div class="space-y-4"><div class="grid grid-cols-2 gap-3"><div class="bg-green-50 p-3 rounded-xl text-center"><p class="text-2xl font-bold text-green-600">${present}</p><p class="text-xs">Present</p></div><div class="bg-red-50 p-3 rounded-xl text-center"><p class="text-2xl font-bold text-red-600">${absent}</p><p class="text-xs">Absent</p></div></div>
                <div class="bg-blue-50 p-3 rounded-xl"><div class="flex justify-between text-xs"><span>Overall ${percent}%</span><span>${present}/${total}</span></div><div class="w-full bg-blue-200 h-1.5 rounded-full"><div class="bg-blue-600 h-1.5 rounded-full" style="width:${percent}%"></div></div><div class="text-xs mt-2">This month: ${monthPresent}/${monthRecords.length} (${monthRecords.length?Math.round((monthPresent/monthRecords.length)*100):0}%)</div></div>
                <div><div class="max-h-60 overflow-y-auto border rounded-lg divide-y">${records.slice(0,30).map(r=>`<div class="flex justify-between p-2"><span class="text-sm">${formatDate(r.date)}</span><span class="text-xs font-bold ${r.status==='Present'?'text-green-600':'text-red-600'}">${r.status}</span></div>`).join('')}</div></div></div>
            `;
        } catch(e) { container.innerHTML = `<div class="text-red-500 text-center">Error loading attendance</div>`; }
    }

    // ======================= HOMEWORK & NOTICES =======================
    function fetchHomework() { const container = document.getElementById('homework-list'); if(!container) return; const userClass = localStorage.getItem('mappedClass'); firebase.database().ref('homework').orderByChild('timestamp').on('value', (snap) => { const data=snap.val(); if(!data) { container.innerHTML='<p class="text-center text-gray-400">No homework</p>'; return; } let html=''; Object.values(data).reverse().forEach(hw=>{ if(hw.class===userClass) html+=`<div class="bg-white p-5 rounded-2xl border shadow-sm"><div class="flex justify-between"><span class="bg-blue-50 text-blue-600 text-xs px-2 py-0.5 rounded">${escapeHtml(hw.subject)}</span><span class="text-xs text-gray-400">${hw.date}</span></div><h3 class="font-bold mt-1">Class ${hw.class}</h3><p class="text-sm mt-2">${escapeHtml(hw.description)}</p><p class="text-[10px] text-gray-400 mt-3">Posted by ${escapeHtml(hw.sender)}</p></div>`; }); container.innerHTML = html || '<p class="text-center text-gray-400">No homework for your class</p>'; }); }
    function fetchNotices() { const container = document.getElementById('notices-list'); if(!container) return; const userClass = localStorage.getItem('mappedClass'); const userGR = localStorage.getItem('userGR'); firebase.database().ref('notices').orderByChild('timestamp').on('value', (snap) => { const data=snap.val(); if(!data){ container.innerHTML='<p class="text-center text-gray-400">No notices</p>'; return; } let html=''; Object.values(data).reverse().forEach(n=>{ let show=false; if(n.targetType==='school') show=true; if(n.targetType==='class' && n.targetValue===userClass) show=true; if(n.targetType==='student' && n.targetValue===userGR) show=true; if(show) html+=`<div class="bg-white p-5 rounded-2xl border-l-4 border-orange-500"><div class="flex justify-between"><span class="text-orange-600 text-xs font-bold">${n.targetType==='school'?'Public':n.targetValue}</span><span class="text-xs text-gray-400">${n.date}</span></div><h3 class="font-bold">${escapeHtml(n.title)}</h3><div class="mt-2"><div class="flex gap-2 text-[10px] mb-1"><button onclick="switchLang('${n.id}','en')" class="px-2 py-1 bg-gray-100 rounded">EN</button><button onclick="switchLang('${n.id}','mr')" class="px-2 py-1 bg-gray-100 rounded">MR</button><button onclick="switchLang('${n.id}','ur')" class="px-2 py-1 bg-gray-100 rounded">UR</button></div><p id="msg-${n.id}" class="text-xs text-gray-600">${escapeHtml(n.message?.en)||'No content'}</p></div><p class="text-[9px] text-gray-400 mt-2">By: ${escapeHtml(n.sender)}</p></div>`; }); container.innerHTML = html || '<p class="text-center text-gray-400">No notices</p>'; }); }
    window.switchLang = (id,lang) => { firebase.database().ref(`notices/${id}`).once('value',snap=>{ let n=snap.val(); let el=document.getElementById(`msg-${id}`); if(el) el.innerText = n.message?.[lang] || n.message?.en || "No content"; }); };

    // ======================= TIME TABLE (FIXED: 8 periods, Friday early dismissal with rowspan) =======================
    window.openDailyTimeTable = () => { 
        const content = document.getElementById('content'); 
        const mappedClass = localStorage.getItem('mappedClass'); 
        content.innerHTML = `<div class="space-y-4 pb-20">
            <div class="flex items-center gap-2">
                <button onclick="loadSection('home')" class="p-2 bg-gray-100 rounded-full"><i class="fa-solid fa-arrow-left"></i></button>
                <h2 class="text-xl font-bold">Daily Time Table</h2>
            </div>
            <div id="tt-grid" class="bg-white rounded-xl border overflow-hidden p-4 text-center text-gray-400">Loading...</div>
        </div>`; 
        loadClassTimetable(mappedClass); 
    };
    
    async function loadClassTimetable(className) { 
        const grid = document.getElementById('tt-grid'); 
        if(!className) return; 
        try { 
            const snap = await firebase.database().ref(`timetable/class/${className}`).once('value'); 
            const data = snap.val() || {}; 
            const days = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
            const totalPeriods = 8;
            const fridayMaxPeriod = 4;
            
            let html = '<div class="overflow-x-auto"><table class="w-full border-collapse text-sm timetable-table">';
            // Header row with Period column + days
            html += `<thead><tr class="bg-green-600 text-white">
                <th class="p-2 border border-green-500 text-center font-bold w-16">Period</th>
                ${days.map(d => `<th class="p-2 border border-green-500 text-center font-bold">${d}</th>`).join('')}
            </tr></thead><tbody>`;
            
            for (let period = 1; period <= totalPeriods; period++) {
                const isFridayPeriod = (period > fridayMaxPeriod);
                // Row styling: subtle background for Friday extra rows
                html += `<tr class="${isFridayPeriod ? 'bg-gray-50' : 'hover:bg-gray-50'}">`;
                // Period column with indicator for Friday early dismissal
                html += `<td class="p-2 border text-center font-bold ${isFridayPeriod ? 'text-gray-400' : 'text-green-600 bg-green-50'}">
                            ${period}${isFridayPeriod ? '†' : ''}
                         </td>`;
                
                for (let dayIdx = 0; dayIdx < days.length; dayIdx++) {
                    const day = days[dayIdx];
                    // Friday special handling: for periods >4, we merge into a single cell (only on period==5)
                    if (day === 'Friday' && isFridayPeriod) {
                        if (period === 5) {
                            const rowspan = totalPeriods - fridayMaxPeriod; // = 4
                            html += `<td rowspan="${rowspan}" class="p-2 border text-center bg-amber-50 align-middle">
                                        <div class="flex flex-col items-center">
                                            <i class="fa-solid fa-bell text-amber-500 text-lg mb-1"></i>
                                            <span class="text-amber-700 font-medium text-xs">Early Dismissal</span>
                                            <span class="text-amber-500 text-[10px] mt-1">No classes after period 4</span>
                                        </div>
                                     </td>`;
                        }
                        // Skip remaining Friday cells for periods 6-8 because they are covered by rowspan
                        continue;
                    }
                    // Normal cell (Monday-Thursday, and Friday periods 1-4)
                    let val = data[day]?.[period] || '—';
                    html += `<td class="p-2 border text-xs text-gray-700">${escapeHtml(val)}</td>`;
                }
                html += `</tr>`;
            }
            // Footnote row
            html += `<tr class="bg-gray-50"><td colspan="7" class="p-2 text-xs text-gray-500">
                        <i class="fa-regular fa-clock mr-1"></i> <strong>Note:</strong> Friday has only 4 periods (Early dismissal)
                     </td></tr>`;
            html += `</tbody></table></div>`;
            grid.innerHTML = html;
        } catch(e) { 
            grid.innerHTML = '<p class="text-red-500">Error loading timetable</p>'; 
        } 
    }
    
    window.openExamTimeTable = () => { const c=document.getElementById('content'); const mappedClass=localStorage.getItem('mappedClass'); c.innerHTML=`<div class="space-y-4 pb-20"><div class="flex items-center gap-2"><button onclick="loadSection('home')" class="p-2 bg-gray-100 rounded-full"><i class="fa-solid fa-arrow-left"></i></button><h2 class="text-xl font-bold">Exam Time Table</h2></div><div id="exam-grid" class="bg-white rounded-xl border p-4"></div></div>`; loadExamTimetable(mappedClass); };
    async function loadExamTimetable(className) { const grid=document.getElementById('exam-grid'); try { const snap=await firebase.database().ref(`exam_timetable/${className}`).once('value'); const data=snap.val()||{}; let html='<table class="w-full"><thead><tr class="bg-gray-100"><th>Date</th><th>Day</th><th>Time</th><th>Subject</th></tr></thead><tbody>'; for(let i=1;i<=10;i++){ let row=data[i]||{}; html+=`<tr><td class="border p-2 text-xs">${row.date||'-'}</td><td class="border p-2 text-xs">${row.day||'-'}</td><td class="border p-2 text-xs">${row.time||'-'}</td><td class="border p-2 text-xs font-bold text-blue-600">${row.sub||'-'}</td></tr>`; } html+='</tbody></table>'; grid.innerHTML=html; } catch(e){ grid.innerHTML='<p class="text-red-500">Error</p>'; } }

    // ======================= FEES DASHBOARD (STUDENT VIEW) =======================
    window.showFeesDashboard = async () => { const content = document.getElementById('content'); content.innerHTML=`<div class="space-y-4 pb-20"><div class="flex items-center justify-between sticky top-0 bg-white z-10 p-2"><button onclick="loadSection('home')" class="p-2 bg-gray-100 rounded-full"><i class="fa-solid fa-arrow-left"></i></button><h2 class="text-lg font-bold">Fees Dashboard</h2><button onclick="refreshFeesData()" class="bg-blue-600 text-white px-3 py-1 rounded-lg text-xs"><i class="fa-solid fa-refresh"></i></button></div><div id="feesContainer"></div></div>`; await loadFeesData(); renderStudentFeesDashboard(); };
    window.refreshFeesData = async () => { await loadFeesData(); renderStudentFeesDashboard(); };
function renderStudentFeesDashboard() {
    const container = document.getElementById('feesContainer');
    if (!container) return;
    
    const studentName = localStorage.getItem('userName');
    const studentGR = localStorage.getItem('userGR');
    const studentClass = localStorage.getItem('mappedClass');
    
    // Normalization function: remove all non-alphanumeric chars and extra spaces, then lowercase
    function normalizeName(name) {
        return name.toLowerCase().replace(/[^\w\s]/g, '').replace(/\s+/g, ' ').trim();
    }
    
    const normalizedStudent = normalizeName(studentName);
    
    // Filter payments using normalized comparison
    const payments = feesDataCache.payments.filter(p => {
        const normalizedPayment = normalizeName(p.name);
        return normalizedPayment === normalizedStudent;
    }).sort((a, b) => b.date.localeCompare(a.date));
    
    const totalPaid = payments.reduce((sum, p) => sum + p.amount, 0);
    const totalFees = feesDataCache.feeStructure[studentClass] || 0;
    const balance = totalFees - totalPaid;
    
    // Debug info (visible in console)
    console.log('Student name:', studentName);
    console.log('Normalized:', normalizedStudent);
    console.log('Payments loaded:', feesDataCache.payments.map(p => ({ name: p.name, normalized: normalizeName(p.name), amount: p.amount })));
    
    container.innerHTML = `
        <div class="bg-gradient-to-r from-blue-600 to-purple-600 rounded-xl p-4 text-white">
            <div class="flex justify-between">
                <div>
                    <h3 class="font-bold">${escapeHtml(studentName)}</h3>
                    <p>Class ${studentClass}</p>
                    ${studentGR ? `<p class="text-xs">GR: ${studentGR}</p>` : ''}
                </div>
                <div class="bg-white/20 p-2 rounded text-center">
                    <span class="text-2xl font-bold">₹${totalPaid.toLocaleString()}</span>
                    <p class="text-[10px]">Total Paid</p>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-xl border overflow-hidden mt-4">
            <div class="bg-gray-50 p-3 font-bold"><i class="fa-solid fa-receipt"></i> Payment History</div>
            <div class="overflow-x-auto">
                <table class="w-full">
                    ${payments.length === 0 ? 
                        `<tr><td class="p-6 text-center text-gray-400">No records</td></tr>` :
                        `<thead><tr class="border-b"><th class="p-2 text-left">Receipt</th><th class="p-2 text-left">Date</th><th class="p-2 text-right">Amount</th></tr></thead>
                        <tbody>${payments.map(p => `
                            <tr class="border-b">
                                <td class="p-2">${escapeHtml(p.receiptNo)}</td>
                                <td class="p-2">${p.date || 'N/A'}</td>
                                <td class="p-2 text-right font-bold text-green-600">₹${p.amount.toLocaleString()}</td>
                            </tr>
                        `).join('')}</tbody>`
                    }
                </table>
            </div>
            <div class="bg-gray-50 p-3 flex justify-between font-bold">
                <span>Total Paid:</span>
                <span class="text-green-600">₹${totalPaid.toLocaleString()}</span>
            </div>
            <div class="p-3 flex justify-between font-bold">
                <span>Balance:</span>
                <span class="${balance > 0 ? 'text-red-600' : 'text-green-600'}">
                    ${balance > 0 ? `₹${balance.toLocaleString()}` : 'FULL PAID ✓'}
                </span>
            </div>
        </div>
        
        ${balance > 0 ? `
            <div class="bg-yellow-50 p-3 rounded-xl mt-3">
                <i class="fa-solid fa-circle-info text-yellow-600"></i> 
                Pending amount ₹${balance.toLocaleString()}. Please contact the school office.
            </div>
        ` : ''}
        
        ${totalFees === 0 ? `
            <div class="bg-yellow-50 p-3 rounded-xl mt-3 text-yellow-700">
                <i class="fa-solid fa-circle-exclamation"></i> 
                Annual fee for Class ${studentClass} has not been set by the admin. Please contact school.
            </div>
        ` : ''}
    `;
}
    window.showFeesChart = async () => { await loadFeesData(); const content = document.getElementById('content'); content.innerHTML=`<div class="space-y-4"><button onclick="loadSection('more')" class="text-blue-600">&larr; Back</button><h2 class="text-lg font-bold">Fee Structure by Class</h2>${Object.entries(feesDataCache.feeStructure).map(([cls,amt])=>`<div class="bg-white p-4 rounded-xl shadow flex justify-between"><span>Class ${cls}</span><span class="font-bold">₹${amt.toLocaleString()}</span></div>`).join('')}</div>`; };

    // ======================= LOAD SECTION (STUDENT FLOW) =======================
    window.loadSection = (section) => {
        const content = document.getElementById('content');
        const name = localStorage.getItem('userName');
        const mappedClass = localStorage.getItem('mappedClass');
        if(section === 'home') {
            content.innerHTML = `
                <div class="space-y-4"><div class="bg-gradient-to-r from-blue-600 to-purple-600 p-6 rounded-2xl text-white shadow"><h2 class="text-2xl font-bold">Hello, ${escapeHtml(name)}! 👋</h2><p class="text-sm opacity-80">${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'})}</p><p class="text-xs opacity-70 mt-1">Class: ${mappedClass}</p></div>
                <div onclick="openDailyTimeTable()" class="bg-white p-5 rounded-xl shadow border-l-4 border-green-500 cursor-pointer hover:scale-[1.02] transition"><div class="flex justify-between"><div><p class="text-gray-500 text-xs">Schedule</p><p class="font-bold text-green-600">Daily Time Table</p><p class="text-xs text-gray-400">Class ${mappedClass}</p></div><i class="fa-regular fa-calendar text-green-400 text-2xl"></i></div></div>
                <div onclick="openExamTimeTable()" class="bg-white p-5 rounded-xl shadow border-l-4 border-orange-500 cursor-pointer hover:scale-[1.02] transition"><div><p class="text-gray-500 text-xs">Assessments</p><p class="font-bold text-orange-600">Exam Time Table</p></div><i class="fa-regular fa-clock text-orange-400"></i></div>
                <div onclick="showFeesDashboard()" class="bg-white p-5 rounded-xl shadow border-l-4 border-emerald-500 cursor-pointer hover:scale-[1.02] transition"><div><p class="text-gray-500 text-xs">Payments</p><p class="font-bold text-emerald-600">Fees Dashboard</p><p class="text-xs text-gray-400">View payment history</p></div><i class="fa-regular fa-credit-card text-emerald-400 text-2xl"></i></div></div>`;
        } else if(section === 'attendance') {
            content.innerHTML = `<div class="space-y-4"><div class="bg-white p-4 rounded-xl"><div id="personal-logs">Loading attendance...</div></div></div>`;
            fetchPersonalStudentLogs(localStorage.getItem('userName'));
        } else if(section === 'homework') {
            content.innerHTML = `<div class="space-y-4"><h2 class="font-bold text-lg"><i class="fa-solid fa-book-open text-blue-600"></i> Homework</h2><div id="homework-list" class="space-y-3"></div></div>`;
            fetchHomework();
        } else if(section === 'notices') {
            content.innerHTML = `<div class="space-y-4"><h2 class="font-bold text-lg"><i class="fa-solid fa-bell text-orange-600"></i> Notices</h2><div id="notices-list" class="space-y-3"></div></div>`;
            fetchNotices();
        } else if(section === 'more') {
            const phone = localStorage.getItem('userPhone');
            content.innerHTML = `<div class="space-y-4"><div class="bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl p-6 text-white"><div class="flex items-center gap-3"><div class="bg-white/20 p-3 rounded-full"><i class="fas fa-user-circle text-4xl"></i></div><div><h3 class="font-bold text-xl">${escapeHtml(name)}</h3><p>Student</p><p class="text-xs"><i class="fas fa-phone"></i> ${escapeHtml(phone) || 'Not provided'}</p></div></div></div><div class="bg-white rounded-2xl p-4"><h3 class="font-bold"><i class="fas fa-cog"></i> Settings</h3><button id="enable-notifications-btn" onclick="togglePushNotifications()" class="w-full mt-3 p-3 bg-blue-50 rounded-xl flex items-center justify-center"><i class="fas fa-bell mr-2 text-blue-600"></i><span>Enable Notifications</span></button><div id="install-button-container" class="hidden mt-3"><button onclick="triggerInstall()" class="w-full p-3 bg-green-50 rounded-xl"><i class="fas fa-download mr-2"></i>Install App</button></div><button onclick="showFeesChart()" class="w-full mt-3 p-3 bg-purple-50 rounded-xl"><i class="fas fa-chart-line"></i> View Fees Chart</button><button onclick="handleLogout()" class="w-full mt-3 p-3 bg-red-50 rounded-xl"><i class="fas fa-sign-out-alt"></i> Logout</button></div></div>`;
            setTimeout(() => { checkNotificationStatus(); if(deferredPrompt) document.getElementById('install-button-container')?.classList.remove('hidden'); }, 100);
        }
    };
    window.setActiveNav = (el, sec) => { document.querySelectorAll('.nav-btn').forEach(btn=>btn.classList.remove('active')); el.classList.add('active'); loadSection(sec); };
    window.triggerInstall = async () => { if(deferredPrompt){ deferredPrompt.prompt(); const {outcome}=await deferredPrompt.userChoice; if(outcome==='accepted') deferredPrompt=null; } };

    // ======================= LOGIN (STUDENT ONLY) =======================
window.handleLogin = async () => {
    const phone = document.getElementById('phone').value.trim();
    const code = document.getElementById('code').value.trim();
    if (!phone || !code) { alert("Please enter phone and code"); return; }
    try {
        const res = await fetch(STUDENT_SHEET_CSV);
        const text = await res.text();
        const rows = text.split('\n').map(r => r.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/));
        const headers = rows[0].map(h => h.replace(/"/g, '').trim().toLowerCase());
        
        // Find column indices dynamically
        const grIdx = headers.findIndex(h => h.includes('gr') || h === 'gr no');
        const nameIdx = headers.findIndex(h => h.includes('name') || h === 'student name');
        const classIdx = headers.findIndex(h => h.includes('class') || h === 'standard' || h === 'grade');
        const phoneIdx = headers.findIndex(h => h.includes('contact') || h === 'phone' || h === 'mobile');
        const codeIdx = headers.findIndex(h => h.includes('code') || h === 'password' || h === 'pin');
        
        let student = null;
        for (let i = 1; i < rows.length; i++) {
            const sPhone = rows[i][phoneIdx]?.replace(/"/g, '').trim();
            const sCode = rows[i][codeIdx]?.replace(/"/g, '').trim();
            if (sPhone === phone && sCode === code) {
                student = {
                    gr: rows[i][grIdx]?.replace(/"/g, '').trim() || 'Pending',
                    name: rows[i][nameIdx]?.replace(/"/g, '').trim(),
                    class: rows[i][classIdx]?.replace(/"/g, '').trim() || 'N/A',
                    phone: sPhone
                };
                break;
            }
        }
        
        if (student) {
            localStorage.setItem('userRole', 'Student');
            localStorage.setItem('userName', student.name);
            localStorage.setItem('mappedClass', student.class);   // critical for fees
            localStorage.setItem('userGR', student.gr);
            localStorage.setItem('userPhone', phone);
            
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('user-name-display').innerText = `Student • ${student.name}`;
            loadSection('home');
            if ('Notification' in window && 'serviceWorker' in navigator) Notification.requestPermission();
            registerForPushNotifications();
        } else {
            alert("Invalid phone or code");
        }
    } catch (e) {
        console.error(e);
        alert("Login failed. Check internet.");
    }
};
    async function registerForPushNotifications() { if ('Notification' in window && 'serviceWorker' in navigator) await Notification.requestPermission(); }

    window.handleLogout = () => { if(confirm("Logout?")){ localStorage.clear(); document.getElementById('main-app').classList.add('hidden'); document.getElementById('login-screen').classList.remove('hidden'); loadSection('home'); } };

    // ======================= PWA & STARTUP =======================
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; const installBtn = document.getElementById('install-button-container'); if(installBtn) installBtn.classList.remove('hidden'); });
    if('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(e=>console.log); }); }
    window.onload = () => { setTimeout(() => { document.getElementById('splash-screen').classList.add('hidden'); if(localStorage.getItem('userRole') === 'Student') { document.getElementById('main-app').classList.remove('hidden'); loadSection('home'); } else { document.getElementById('login-screen').classList.remove('hidden'); } }, 1500); };
    window.scrollToTop = scrollToTop;
    window.toggleTheme = toggleTheme;
</script>
